name: Deploy to Firebase Hosting on Merge

steps:
      - uses: actions/checkout@v4

      - name: Install and Build Frontend
        run: npm ci && npm run build
        working-directory: ./svapo

      - uses: FirebaseExtended/action-hosting-deploy@v0

on:
  push:
    branches:
      - main  # Cambia in master se la tua branch principale si chiama master
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci && npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CATALOGO_PRODOTTI_SVAPO }}
          projectId: catalogo-prodotti-svapo
          channelId: live