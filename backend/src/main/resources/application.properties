spring.application.name=backend

# MySQL datasource — values injected via environment variables (see .env / docker-compose.yml)
# sslMode=REQUIRED is needed for managed providers like Aiven; harmless for local Docker MySQL too
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${MYSQL_DATABASE:vapestore}?serverTimezone=UTC&sslMode=REQUIRED
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

# Upload file limits
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Upload directory — override via UPLOAD_DIR env var (Docker sets this to /app/uploads)
upload.dir=${UPLOAD_DIR:uploads}

# CORS — comma-separated list of allowed origins
# Example: http://localhost,https://yourdomain.com
cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost}
